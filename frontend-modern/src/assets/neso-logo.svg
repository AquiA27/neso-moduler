<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>
  
  <!-- Outer Wreath (simplified) -->
  <path d="M 60,200 A 140,140 0 0,1 340,200" fill="none" stroke="url(#gold)" stroke-width="8" stroke-dasharray="15 15"/>
  <path d="M 60,200 A 140,140 0 0,0 340,200" fill="none" stroke="url(#gold)" stroke-width="8" stroke-dasharray="15 15"/>

  <!-- Coffee Cup Base -->
  <path d="M 140,220 C 140,260 260,260 260,220 L 270,160 C 270,160 130,160 130,160 Z" fill="url(#blue)" stroke="url(#gold)" stroke-width="6"/>
  <!-- Circuit lines inside cup -->
  <path d="M 160,220 L 160,180 M 200,240 L 200,180 M 240,220 L 240,180" stroke="url(#gold)" stroke-width="6" fill="none"/>
  <!-- Steam -->
  <path d="M 180,140 Q 170,120 180,100 T 180,60" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 220,130 Q 210,110 220,90 T 220,50" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>

  <!-- Robot Arm (serving tray) -->
  <path d="M 260,190 L 310,190 L 330,220 L 360,220" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linejoin="round"/>
  <!-- Cloche/Tray on arm -->
  <path d="M 290,180 L 330,180 M 310,180 Q 310,150 280,150 Q 280,140 310,150 Q 340,150 310,180" fill="none" stroke="url(#gold)" stroke-width="8"/>
  
  <!-- Text -->
  <text x="50%" y="300" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="4">NESO</text>
  <text x="50%" y="340" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="2">CAFÉ &amp; AI EATERY</text>
</svg>
